name: AllerPaw CI – APK Build

on:
  push:
    branches:
      - main
      - '0.*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x AllerPaw/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.toml', '**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run Unit Tests
        working-directory: AllerPaw
        run: ./gradlew test --no-daemon

      - name: Build Debug APK
        working-directory: AllerPaw
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: allerpaw-debug-${{ github.run_number }}
          path: AllerPaw/app/build/outputs/apk/debug/*.apk
          retention-days: 14

  release:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x AllerPaw/gradlew

      - name: Build Release APK (unsigned)
        working-directory: AllerPaw
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: allerpaw-release-${{ github.run_number }}
          path: AllerPaw/app/build/outputs/apk/release/*.apk
          retention-days: 30
